  }

  .success-btn--primary {
    background: var(--orange);
    color: var(--navy-900);
    border: none;
  }

  .success-btn--primary:hover {
    background: var(--orange-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(242, 101, 34, 0.25);
  }

  .success-btn--ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border-hover);
  }

  .success-btn--ghost:hover {
    border-color: var(--orange);
    color: var(--orange);
  }

  .success-countdown {
    margin-top: 32px;
    font-size: 12px;
    color: var(--text-muted);
  }

<main class="success-page">

    <div class="success-icon">

    <p class="success-text" id="successText">
      Gracias por contactarte con The Maia Group. Hemos recibido tu mensaje y te responderemos
      en un plazo máximo de 1–2 días hábiles.
    </p>

    <div class="success-actions">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Volver al inicio
      </a>
      <a href="https://wa.me/19034598763" target="_blank" rel="noopener noreferrer" class="success-btn success-btn--ghost">
        WhatsApp
      </a>
    </div>

    <p class="success-countdown" id="successCountdown">
      Redirigiendo al inicio en <strong id="countNum">10</strong> segundos…
    </p>

  </div>
</main>

<script>
  // Auto-redirect countdown
  (function () {
    var count = 10;
    var countEl = document.getElementById('countNum');
    var timer = setInterval(function () {
      count -= 1;
      if (countEl) countEl.textContent = count;
      if (count <= 0) {
        clearInterval(timer);
        window.location.href = '/';
      }
    }, 1000);

    // Detect language from referrer or navigator
    var lang = (navigator.language || 'es').startsWith('en') ? 'en' : 'es';
    if (lang === 'en') {
      var t = document.getElementById('successTitle');
      var p = document.getElementById('successText');
      var c = document.getElementById('successCountdown');
      var n = document.getElementById('countNum');
      if (t) t.textContent = 'Message sent!';
      if (p) p.textContent = 'Thank you for reaching out to The Maia Group. We have received your message and will reply within 1–2 business days.';
      if (c) c.innerHTML = 'Redirecting to home in <strong id="countNum">' + count + '</strong> seconds\u2026';
    }
  })();
</script>
